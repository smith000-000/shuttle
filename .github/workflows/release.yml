name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to package, for example v0.1.0"
        required: true
      targets:
        description: "Comma-separated GOOS/GOARCH targets"
        required: false
        default: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
      publish:
        description: "Upload archives to a GitHub release"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      RELEASE_TARGETS: ${{ github.event_name == 'workflow_dispatch' && inputs.targets || 'linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64' }}
      RELEASE_PUBLISH: ${{ github.event_name == 'push' || inputs.publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Package release archives
        run: ./scripts/package-release.sh
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          TARGETS: ${{ env.RELEASE_TARGETS }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: shuttle-${{ env.RELEASE_VERSION }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS

      - name: Publish GitHub release assets
        if: env.RELEASE_PUBLISH == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" dist/*.tar.gz dist/*.zip dist/SHA256SUMS --clobber
          else
            gh release create "$RELEASE_VERSION" dist/*.tar.gz dist/*.zip dist/SHA256SUMS \
              --title "$RELEASE_VERSION" \
              --notes "Automated Shuttle release for $RELEASE_VERSION."
          fi
